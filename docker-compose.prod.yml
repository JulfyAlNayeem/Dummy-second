services:
  # MongoDB Database
  mongo:
    image: mongo:6
    container_name: dummy-mongo-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dummy-network

  # Redis — sessions + Socket.IO adapter
  redis:
    image: redis:7-alpine
    container_name: dummy-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dummy-network

  # LiveKit SFU — handles audio/video for calls up to 50 people
  # Runs as a separate process, backend talks to it via HTTP API
  # Frontend connects directly via WebSocket on port 7880
  livekit:
    image: livekit/livekit-server:latest
    container_name: dummy-livekit-prod
    restart: always
    ports:
      - "7880:7880"                          # HTTP/WebSocket — frontend connects here
      - "7881:7881"                          # TCP WebRTC fallback
      - "50000-50200:50000-50200/udp"        # UDP WebRTC media ports
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dummy-network

  # Backend Node.js Application
  backend:
    image: ${DOCKERHUB_USERNAME}/dummy-backend:latest
    container_name: dummy-backend-prod
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.production        # ← loads ALL vars from file directly
    environment:
      LIVEKIT_URL: http://livekit:7880  # ← override only this one
      # because in .env.production LIVEKIT_URL=http://localhost:7880
      # but inside Docker it must be http://livekit:7880 (service name)
    volumes:
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    networks:
      - dummy-network
  # Frontend React Application
  frontend:
    image: ${DOCKERHUB_USERNAME}/dummy-frontend:latest
    container_name: dummy-frontend-prod
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - dummy-network

  # Nginx Reverse Proxy
  # Sits in front of everything — routes / to frontend, /api and /socket.io to backend
  # Recreated LAST in deploy so it picks up correct container IPs
  nginx-proxy:
    image: nginx:alpine
    container_name: dummy-nginx-prod
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dummy-network

  # Backup Scheduler
  backup-scheduler:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup-cron
    container_name: dummy-backup-scheduler-prod
    restart: always
    environment:
      TZ: Asia/Dhaka
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      DUMP_DIR: /app/backups
      UPLOAD_TO_GCS: "false"
      KEEP_LOCAL_BACKUP: "true"
      LOCAL_RETENTION_DAYS: "7"
    volumes:
      - ./backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - dummy-network

volumes:
  mongo_data:
  redis_data:

networks:
  dummy-network:
    driver: bridge
