# Netlify configuration for the React + Vite frontend.
#
# ⚠️ THIS FILE MUST EXIST AT THE REPO ROOT, AND NOWHERE ELSE. ⚠️
# Per Netlify's own documentation: "A base directory specified in a root-level
# netlify.toml overrides the UI setting" — a root-level netlify.toml ALWAYS
# wins over any other config, including a copy placed inside frontend/.
# If a netlify.toml also exists at frontend/netlify.toml, DELETE IT. Two
# copies caused this project to keep building with stale settings even after
# this file was updated, because the root copy silently took priority every
# single time regardless of which one was actually edited.
#
# Verify only one copy exists by running, from your repo root:
#   find . -name netlify.toml -not -path "*/node_modules/*"
# It should print exactly one line: ./netlify.toml

[build]
  # The frontend package is named "alfajr" in frontend/package.json
  # (see `"name": "alfajr"`) — pnpm's --filter flag needs this exact name,
  # not the folder name "frontend".
  #
  # Netlify auto-detects this pnpm workspace and runs `pnpm install` for
  # ALL 4 workspace packages BEFORE this build.command even executes (visible
  # in every build log as "pnpm workspaces detected... Successfully installed
  # dependencies", happening prior to "Starting build script"). So this
  # command does NOT need to install anything itself.
  #
  # Do NOT use `cd frontend && npm install && npm run build` — npm does not
  # understand pnpm's symlink-based node_modules layout in a workspace and
  # incorrectly tries to run lifecycle scripts that belong to a DEPENDENCY's
  # own package.json (specifically axios's "prepare": "husky install", meant
  # only for axios's own contributors), which crashes the build with
  # "husky: not found". `pnpm --filter alfajr` avoids this entirely and
  # works correctly regardless of which directory it's invoked from.
  command = "pnpm --filter alfajr run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# ───────────────────────────────────────────────────────────────────────────
# API PROXY — replaces what the Vite dev-server proxy does locally.
# Netlify has no backend of its own, so every /api/* request must be
# forwarded to your Render backend URL. Replace the placeholder below with
# your actual Render service URL once it's deployed.
#
# NOTE: if you've set VITE_API_URL as an env var (see .env.example), the
# frontend talks to Render directly and never hits this redirect at all —
# this rule is a fallback for safety / for any hardcoded relative fetches
# that might still exist.
# ───────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/api/:splat"
  status = 200
  force = true

# Static/encrypted file serving — uploaded media, served from backend disk.
[[redirects]]
  from = "/uploads/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/uploads/:splat"
  status = 200
  force = true

# Public images (default avatars etc.)
[[redirects]]
  from = "/images/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/images/:splat"
  status = 200
  force = true

# ───────────────────────────────────────────────────────────────────────────
# SPA fallback — React Router needs every unknown path to resolve to index.html
# so client-side routing (e.g. /reports, /tb/:chatroom_id) works on full page
# loads and refreshes, not just in-app navigation.
# This MUST be the LAST redirect rule (Netlify checks rules top to bottom).
# ───────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache built JS/CSS aggressively — Vite content-hashes filenames so this is safe
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
