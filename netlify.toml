# Netlify configuration for the React + Vite frontend.
#
# ── WHERE TO PUT THIS FILE — two supported options ──────────────────────────
#
# OPTION A (recommended): Set Netlify's "Base directory" to "frontend" in the
#   Netlify UI (Site settings → Build & deploy → Build settings). Then put
#   this file at frontend/netlify.toml. With Base directory set correctly,
#   "command" and "publish" below are relative to frontend/, so they stay
#   simple: command = "npm run build", publish = "dist".
#
# OPTION B (if you don't set Base directory, or pnpm workspace detection
#   keeps overriding it): Put this file at the REPO ROOT instead, and use
#   the "cd frontend &&" command shown below, with publish pointing at
#   "frontend/dist" (relative to repo root).
#
# This file is written for OPTION B because it's more robust against
# Netlify's pnpm-workspace auto-detection, which was the actual cause of
# the "Missing script: build" error — Netlify ran `npm run build` from the
# REPO ROOT (which has no "build" script) even though packagePath: frontend
# was detected. If you've confirmed Base directory is correctly set to
# "frontend" in the UI, you can simplify to Option A instead.

[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# ───────────────────────────────────────────────────────────────────────────
# API PROXY — replaces what the Vite dev-server proxy does locally.
# Netlify has no backend of its own, so every /api/* request must be
# forwarded to your Render backend URL. Replace the placeholder below with
# your actual Render service URL once it's deployed.
#
# NOTE: if you've set VITE_API_URL as an env var (see .env.example), the
# frontend talks to Render directly and never hits this redirect at all —
# this rule is a fallback for safety / for any hardcoded relative fetches
# that might still exist.
# ───────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/api/:splat"
  status = 200
  force = true

# Static/encrypted file serving — uploaded media, served from backend disk.
[[redirects]]
  from = "/uploads/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/uploads/:splat"
  status = 200
  force = true

# Public images (default avatars etc.)
[[redirects]]
  from = "/images/*"
  to = "https://YOUR-BACKEND-NAME.onrender.com/images/:splat"
  status = 200
  force = true

# ───────────────────────────────────────────────────────────────────────────
# SPA fallback — React Router needs every unknown path to resolve to index.html
# so client-side routing (e.g. /reports, /tb/:chatroom_id) works on full page
# loads and refreshes, not just in-app navigation.
# This MUST be the LAST redirect rule (Netlify checks rules top to bottom).
# ───────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache built JS/CSS aggressively — Vite content-hashes filenames so this is safe
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
